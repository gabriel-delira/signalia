services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: signalia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass isverysecurepassword
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "isverysecurepassword", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  back:
    build:
      context: ./signalia-back
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/signalia?schema=public"
      REDIS_URL: "redis://:isverysecurepassword@redis:6379"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
      JWT_SECRET: "change-me-in-production"
      JWT_REFRESH_SECRET: "change-me-refresh-in-production"
      JWT_EXPIRES_IN: "1h"
      JWT_REFRESH_EXPIRES_IN: "7d"
      PORT: "3001"
      NODE_ENV: "production"
      FRONTEND_URL: "http://localhost"
      API_URL: "http://localhost/api"
      PLATFORM_FEE_PCT: "0.15"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  front:
    build:
      context: ./signalia-front
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost/api"
    environment:
      NODE_ENV: "production"
    depends_on:
      - back
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - back
      - front
    restart: unless-stopped

volumes:
  postgres_data:
